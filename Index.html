                            <thead className="bg-gray-50 text-gray-600 border-b">
                                <tr>
                                    <th className="px-4 py-3 w-10 text-center"><input type="checkbox" onChange={(e) => setSelectedInvoices(e.target.checked ? sortedInvoices.map(i=>i.id) : [])} checked={sortedInvoices.length>0 && selectedInvoices.length===sortedInvoices.length} className="w-4 h-4 cursor-pointer rounded" /></th>
                                    <th className="px-4 py-3">No. Invoice</th><th className="px-4 py-3">Pelanggan</th><th className="px-4 py-3">Tgl Terbit</th><th className="px-4 py-3">Jatuh Tempo</th><th className="px-4 py-3 text-right">Total Tagihan</th><th className="px-4 py-3 text-right">Dana Masuk</th><th className="px-4 py-3 text-right">Sisa Piutang</th><th className="px-4 py-3 text-center">Status</th><th className="px-4 py-3 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                {sortedInvoices.length === 0 && <tr><td colSpan="10" className="text-center py-8 text-gray-400">Data tidak ditemukan.</td></tr>}
                                {sortedInvoices.map(inv => {
                                    let isOverdue = false; if (inv.tglJatuhTempo !== '-' && inv.statusPembayaran === 'OUTSTANDING') { const due = new Date(inv.tglJatuhTempo); if (due < new Date()) isOverdue = true; }
                                    return (
                                        <tr key={inv.id} className={`border-b border-gray-50 transition ${inv.statusPembayaran === 'BATAL' ? 'bg-gray-50 opacity-60' : 'hover:bg-gray-50'}`}>
                                            <td className="px-4 py-3 text-center"><input type="checkbox" checked={selectedInvoices.includes(inv.id)} onChange={() => setSelectedInvoices(prev => prev.includes(inv.id) ? prev.filter(i => i !== inv.id) : [...prev, inv.id])} className="w-4 h-4 cursor-pointer" /></td>
                                            <td className={`px-4 py-3 font-medium text-blue-600 ${inv.statusPembayaran === 'BATAL' ? 'line-through text-gray-400' : ''}`}>{inv.noInvoice}<br/>{inv.statusPembayaran !== 'BATAL' && <span className="text-xs font-normal text-gray-500">{inv.type}</span>}</td>
                                            <td className={`px-4 py-3 ${inv.statusPembayaran === 'BATAL' ? 'line-through text-gray-400' : ''}`}>{inv.customerName}<br/>{inv.periodeProgress && inv.statusPembayaran !== 'BATAL' && <span className="text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">Prg: {inv.periodeProgress}</span>}</td>
                                            <td className="px-4 py-3">{inv.statusPembayaran === 'BATAL' ? '-' : formatDate(inv.date)}</td>
                                            <td className="px-4 py-3"><span className={isOverdue ? 'text-red-600 font-bold' : ''}>{inv.statusPembayaran === 'BATAL' ? '-' : formatDate(inv.tglJatuhTempo)}</span></td>
                                            <td className={`px-4 py-3 text-right font-semibold ${inv.statusPembayaran === 'BATAL' ? 'text-gray-400' : ''}`}>{formatIDR(inv.totalTagihan)}</td>
                                            <td className="px-4 py-3 text-right">
                                                <span className={`font-semibold ${inv.danaMasuk > 0 ? 'text-green-600' : 'text-gray-400'}`}>{formatIDR(inv.danaMasuk)}</span>
                                                {inv.paymentHistory && inv.paymentHistory.length > 1 && (<div className="text-[10px] text-purple-600 mt-0.5 font-bold">{inv.paymentHistory.length}x Pay</div>)}
                                            </td>
                                            <td className={`px-4 py-3 text-right font-bold ${inv.statusPembayaran === 'BATAL' ? 'text-gray-400' : 'text-red-500'}`}>{formatIDR(inv.sisaPiutang)}</td>
                                            <td className="px-4 py-3 text-center"><span className={`px-2 py-1 rounded text-xs font-bold ${inv.statusPembayaran === 'PAID' ? 'bg-green-100 text-green-700' : inv.statusPembayaran === 'BATAL' ? 'bg-gray-200 text-gray-600' : 'bg-red-100 text-red-700'}`}>{inv.statusPembayaran}</span></td>
                                            <td className="px-4 py-3 text-center">
                                                {inv.statusPembayaran !== 'BATAL' ? (
                                                    <div className="flex justify-center items-center space-x-2">
                                                        <button onClick={() => openEditInvoice(inv)} className="bg-blue-100 hover:bg-blue-200 text-blue-700 p-1.5 rounded-md transition"><Icon name="Edit" size={16} /></button>
                                                        <button onClick={() => openEditPayment(inv)} className="bg-green-100 hover:bg-green-200 text-green-700 p-1.5 rounded-md transition"><Icon name="CreditCard" size={16} /></button>
                                                        {inv.statusPembayaran === 'OUTSTANDING' && (
                                                            <Fragment>
                                                                <button onClick={() => openEmailDrafter(inv)} className="bg-purple-100 hover:bg-purple-200 text-purple-700 p-1.5 rounded-md transition"><Icon name="Sparkles" size={16} /></button>
                                                                <button onClick={() => confirmCancelInvoice(inv)} className="bg-gray-100 hover:bg-red-200 text-gray-500 hover:text-red-700 p-1.5 rounded-md transition"><Icon name="Ban" size={16} /></button>
                                                            </Fragment>
                                                        )}
                                                    </div>
                                                ) : (<span className="text-xs text-gray-400">Dibatalkan</span>)}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                        </div>
                    </div>
                </div>
                );
            };

            const renderProgressTable = () => {
                const filteredProgresses = progresses.filter(prog => (prog.period||'').toLowerCase().includes(searchTermProgress.toLowerCase()) || (prog.items||[]).some(it => (it.project||'').toLowerCase().includes(searchTermProgress.toLowerCase())));
                return (
                <div className="space-y-4 animate-fade-in">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-gray-800">Pengakuan Progress (Unbilled)</h2>
                        <div className="flex flex-wrap items-center gap-2">
                            <div className="relative w-full sm:w-64"><span className="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><Icon name="Search" size={14} /></span><input type="text" placeholder="Cari..." value={searchTermProgress} onChange={(e) => setSearchTermProgress(e.target.value)} className="pl-9 pr-4 py-2 border rounded-lg text-sm w-full outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            <button onClick={() => downloadTemplateExcel('progress')} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-3 py-2 rounded-lg text-sm font-semibold flex items-center"><Icon name="Table" size={16} className="mr-1"/> Template</button>
                            <label className="bg-purple-100 hover:bg-purple-200 text-purple-700 px-3 py-2 rounded-lg text-sm font-semibold flex items-center cursor-pointer"><Icon name="UploadCloud" size={16} className="mr-1"/> Import Excel<input type="file" accept=".xlsx, .xls" className="hidden" ref={fileInputProgress} onChange={(e) => handleImportExcel(e, 'progress')} /></label>
                            <button onClick={() => { setProgressForm(initialProgressForm); setIsProgressModalOpen(true); }} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center"><Icon name="Plus" size={18} className="mr-2" /> Input Baru</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-gray-50 border-b"><tr><th className="px-4 py-3 w-16 text-center">Urutan</th><th className="px-4 py-3">Periode</th><th className="px-4 py-3">Rincian Pekerjaan</th><th className="px-4 py-3 text-right">Total Pengakuan (Rp)</th><th className="px-4 py-3 text-center">Aksi</th></tr></thead>
                            <tbody>
                                {filteredProgresses.length === 0 && <tr><td colSpan="5" className="text-center py-8 text-gray-400">Data tidak ditemukan.</td></tr>}
                                {filteredProgresses.map((prog, index) => (
                                    <tr key={prog.id} className="border-b border-gray-50 hover:bg-gray-50">
                                        <td className="px-4 py-3 text-center bg-gray-50/50">
                                            <div className="flex flex-col items-center justify-center space-y-1">
                                                <button onClick={() => handleMoveProgress(prog.id, 'up')} disabled={index===0||!!searchTermProgress} className={`p-1 rounded ${index===0||!!searchTermProgress?'text-gray-300':'text-blue-500 hover:bg-blue-100'}`}><Icon name="ArrowUp" size={12} /></button>
                                                <button onClick={() => handleMoveProgress(prog.id, 'down')} disabled={index===filteredProgresses.length-1||!!searchTermProgress} className={`p-1 rounded ${index===filteredProgresses.length-1||!!searchTermProgress?'text-gray-300':'text-blue-500 hover:bg-blue-100'}`}><Icon name="ArrowDown" size={12} /></button>
                                            </div>
                                        </td>
                                        <td className="px-4 py-3 font-medium align-top">{prog.period}</td>
                                        <td className="px-4 py-3 align-top">
                                            {prog.items && Array.isArray(prog.items) ? (
                                                <ul className="space-y-1">
                                                    {prog.items.map((it, i) => (
                                                        <li key={i}><span>{it.project} <span className="text-xs text-gray-500">({it.jobcode})</span></span> <span className="text-xs text-blue-600 font-medium">{formatIDR(it.amount)}</span></li>
                                                    ))}
                                                </ul>
                                            ) : (
                                                <Fragment>{prog.project}<br/><span className="text-xs text-gray-500">{prog.jobcode ? `(${prog.jobcode})` : ''}</span></Fragment>
                                            )}
                                        </td>
                                        <td className="px-4 py-3 text-right align-top font-bold text-blue-700">{formatIDR(prog.items && Array.isArray(prog.items) ? prog.items.reduce((s,it)=>s+Number(it.amount),0) : prog.amount)}</td>
                                        <td className="px-4 py-3 text-center align-top"><div className="flex justify-center items-center space-x-2"><button onClick={() => openEditProgress(prog)} className="text-blue-600 p-1.5 bg-blue-50 hover:bg-blue-100 rounded"><Icon name="Edit" size={16} /></button><button onClick={() => confirmDeleteProgress(prog.id)} className="text-red-500 p-1.5 bg-red-50 hover:bg-red-100 rounded"><Icon name="Trash2" size={16} /></button></div></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
                );
            };

            const renderSettings = () => {
                const filtered = customers.filter(c => (c.name||'').toLowerCase().includes(searchTermCustomer.toLowerCase()));
                return (
                <div className="space-y-4 animate-fade-in">
                    <div className="flex justify-between items-center max-w-4xl">
                        <h2 className="text-2xl font-bold text-gray-800">Master Data Pelanggan</h2>
                        <div className="flex flex-wrap items-center gap-2">
                            <div className="relative w-full sm:w-56"><span className="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><Icon name="Search" size={14} /></span><input type="text" placeholder="Cari Pelanggan..." value={searchTermCustomer} onChange={(e) => setSearchTermCustomer(e.target.value)} className="pl-9 pr-4 py-2 border rounded-lg text-sm w-full outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            <button onClick={() => downloadTemplateExcel('pelanggan')} className="bg-emerald-100 text-emerald-700 px-3 py-2 rounded-lg flex items-center text-sm font-semibold border"><Icon name="Table" size={16} className="mr-1"/> Template</button>
                            <label className="bg-purple-100 text-purple-700 px-3 py-2 rounded-lg flex items-center text-sm font-semibold border cursor-pointer"><Icon name="UploadCloud" size={16} className="mr-1"/> Import Excel<input type="file" accept=".xlsx, .xls" className="hidden" ref={fileInputPelanggan} onChange={(e) => handleImportExcel(e, 'pelanggan')} /></label>
                            <button onClick={() => { setSettingForm(initialSettingForm); setIsSettingModalOpen(true); }} className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center"><Icon name="Plus" size={18} className="mr-2" /> Tambah Baru</button>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border max-w-4xl">
                        <table className="w-full text-sm text-left"><thead className="bg-gray-50"><tr><th className="px-4 py-2">Nama Pelanggan</th><th className="px-4 py-2">Termin (Hari)</th><th className="px-4 py-2 text-center">Aksi</th></tr></thead><tbody>{filtered.length===0 && <tr><td colSpan="3" className="text-center py-8 text-gray-400">Data tidak ditemukan.</td></tr>}{filtered.map(c => (<tr key={c.id} className="border-b hover:bg-gray-50"><td className="px-4 py-3">{c.name}</td><td className="px-4 py-3 font-medium">{c.term} Hari</td><td className="px-4 py-3 text-center"><button onClick={() => openEditSetting(c)} className="text-blue-600 p-1 bg-blue-50 rounded mr-2"><Icon name="Edit" size={16}/></button><button onClick={() => confirmDeleteSetting(c.id, c.name)} className="text-red-500 p-1 bg-red-50 rounded"><Icon name="Trash2" size={16}/></button></td></tr>))}</tbody></table>
                    </div>
                </div>
                );
            };

            const renderJobcodeSettings = () => {
                const filtered = jobcodes.filter(j => (j.jobcode||'').toLowerCase().includes(searchTermJobcode.toLowerCase()) || (j.namaPekerjaan||'').toLowerCase().includes(searchTermJobcode.toLowerCase()));
                return (
                <div className="space-y-4 animate-fade-in">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-gray-800">Setting Jobcode &amp; Relasi</h2>
                        <div className="flex flex-wrap items-center gap-2">
                            <div className="relative w-full sm:w-64"><span className="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><Icon name="Search" size={14} /></span><input type="text" placeholder="Cari Jobcode..." value={searchTermJobcode} onChange={(e) => setSearchTermJobcode(e.target.value)} className="pl-9 pr-4 py-2 border rounded-lg text-sm w-full outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            <button onClick={() => downloadTemplateExcel('jobcode')} className="bg-emerald-100 text-emerald-700 px-3 py-2 rounded-lg flex items-center text-sm font-semibold border"><Icon name="Table" size={16} className="mr-1"/> Template</button>
                            <label className="bg-purple-100 text-purple-700 px-3 py-2 rounded-lg flex items-center text-sm font-semibold border cursor-pointer"><Icon name="UploadCloud" size={16} className="mr-1"/> Import Excel<input type="file" accept=".xlsx, .xls" className="hidden" ref={fileInputJobcode} onChange={(e) => handleImportExcel(e, 'jobcode')} /></label>
                            <button onClick={() => { setJobcodeForm(initialJobcodeForm); setIsJobcodeModalOpen(true); }} className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center"><Icon name="Plus" size={18} className="mr-2" /> Tambah Baru</button>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border overflow-hidden">
                        <table className="w-full text-sm text-left"><thead className="bg-gray-50"><tr><th className="px-4 py-2">Jobcode</th><th className="px-4 py-2">Nama Pekerjaan</th><th className="px-4 py-2">Pelanggan (Klien)</th><th className="px-4 py-2">Jenis Pekerjaan</th><th className="px-4 py-2">Lokasi</th><th className="px-4 py-2 text-center">Aksi</th></tr></thead><tbody>{filtered.length===0 && <tr><td colSpan="6" className="text-center py-8 text-gray-400">Data tidak ditemukan.</td></tr>}{filtered.map(j => (<tr key={j.id} className="border-b hover:bg-gray-50"><td className="px-4 py-3 font-medium text-blue-600">{j.jobcode}</td><td className="px-4 py-3">{j.namaPekerjaan}</td><td className="px-4 py-3"><span className="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-semibold">{j.customerName || '- Multi Pelanggan -'}</span></td><td className="px-4 py-3">{j.type}</td><td className="px-4 py-3 text-gray-600">{j.lokasi}</td><td className="px-4 py-3 text-center"><button onClick={() => openEditJobcode(j)} className="text-blue-600 p-1 bg-blue-50 rounded mr-2"><Icon name="Edit" size={16}/></button><button onClick={() => confirmDeleteJobcode(j.id, j.jobcode)} className="text-red-500 p-1 bg-red-50 rounded"><Icon name="Trash2" size={16}/></button></td></tr>))}</tbody></table>
                    </div>
                </div>
                );
            };

            const renderBankAccountSettings = () => {
                const filtered = bankAccounts.filter(b => (b.namaBank||'').toLowerCase().includes(searchTermBankAccount.toLowerCase()));
                return (
                <div className="space-y-4 animate-fade-in">
                    <div className="flex justify-between items-center max-w-4xl">
                        <h2 className="text-2xl font-bold text-gray-800">Master Rekening Perusahaan</h2>
                        <div className="flex flex-wrap items-center gap-2">
                            <div className="relative w-full sm:w-56"><span className="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><Icon name="Search" size={14} /></span><input type="text" placeholder="Cari Rekening..." value={searchTermBankAccount} onChange={(e) => setSearchTermBankAccount(e.target.value)} className="pl-9 pr-4 py-2 border rounded-lg text-sm w-full outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            <button onClick={() => { setBankAccountForm(initialBankAccountForm); setIsBankAccountModalOpen(true); }} className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center"><Icon name="Plus" size={18} className="mr-2" /> Tambah Rekening</button>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border max-w-4xl">
                        <table className="w-full text-sm text-left"><thead className="bg-gray-50"><tr><th className="px-4 py-2">Nama Bank</th><th className="px-4 py-2">No. Rekening</th><th className="px-4 py-2">Atas Nama</th><th className="px-4 py-2 text-center">Aksi</th></tr></thead><tbody>{filtered.length===0 && <tr><td colSpan="4" className="text-center py-8 text-gray-400">Belum ada data rekening.</td></tr>}{filtered.map(b => (<tr key={b.id} className="border-b hover:bg-gray-50"><td className="px-4 py-3 font-bold text-indigo-700">{b.namaBank}</td><td className="px-4 py-3 font-medium">{b.noRekening}</td><td className="px-4 py-3">{b.atasNama}</td><td className="px-4 py-3 text-center"><button onClick={() => openEditBankAccount(b)} className="text-blue-600 p-1 bg-blue-50 rounded mr-2"><Icon name="Edit" size={16}/></button><button onClick={() => confirmDeleteBankAccount(b.id, b.namaBank)} className="text-red-500 p-1 bg-red-50 rounded"><Icon name="Trash2" size={16}/></button></td></tr>))}</tbody></table>
                    </div>
                </div>
                );
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col md:flex-row font-sans relative overflow-hidden">
                <LoadingOverlay />
                
                {/* SIDEBAR */}
                <div className={`bg-white border-r border-gray-200 shadow-sm flex flex-col z-20 relative transition-all duration-300 flex-shrink-0 ${isSidebarOpen ? 'w-full md:w-64' : 'w-20'}`}>
                    <div className="p-4 border-b border-gray-100 flex flex-col relative min-h-[110px]">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className={`absolute top-4 ${isSidebarOpen ? 'right-4' : 'left-1/2 transform -translate-x-1/2'} text-gray-400 hover:text-blue-600 bg-white p-1 rounded-md`}><Icon name="Menu" size={20} /></button>
                        {isSidebarOpen ? (
                            <div className="mt-8">
                                <h1 className="text-lg font-extrabold text-blue-700 truncate">{profile.name}</h1>
                                <p className="text-xs font-semibold text-gray-500 mt-1.5 mb-3 leading-snug">Sistem Keuangan</p>
                                <div className="text-[10px] font-medium text-gray-400 flex items-center space-x-1 border-t border-gray-50 pt-2"><Icon name={!isOnline ? 'WifiOff' : 'Database'} size={10} className={!isOnline ? 'text-red-500' : 'text-green-500'} /><span className={!isOnline ? 'text-red-500 font-bold' : 'text-green-600 font-bold'}>{!isOnline ? 'Mode Offline' : 'Local DB Active'}</span></div>
                            </div>
                        ) : (<div className="mt-10 flex justify-center"><Icon name="Building" size={24} className="text-blue-600" /></div>)}
                    </div>
                    
                    <nav className="flex-1 p-3 space-y-2 overflow-y-auto">
                        {['dashboard', 'progress', 'invoice', 'setting', 'jobcode', 'rekening'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`w-full flex items-center ${isSidebarOpen ? 'space-x-3 px-4 justify-start' : 'justify-center px-0'} py-3 rounded-lg text-sm font-medium transition ${activeTab === tab ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}>
                                <Icon name={tab==='dashboard'?'LayoutDashboard':tab==='progress'?'FileText':tab==='invoice'?'Receipt':tab==='setting'?'Settings':tab==='jobcode'?'Briefcase':'Landmark'} size={isSidebarOpen ? 18 : 22} />
                                {isSidebarOpen && <span className="capitalize">{tab==='setting'?'Pelanggan':tab==='jobcode'?'Jobcode':tab==='rekening'?'Rekening':tab}</span>}
                            </button>
                        ))}
                    </nav>

                    <div className="p-4 border-t border-gray-100">
                        <button onClick={onLogout} className={`w-full flex items-center text-red-500 hover:bg-red-50 rounded-lg p-3 transition ${isSidebarOpen ? 'justify-start space-x-2' : 'justify-center'}`} title="Keluar / Ganti Ruang Kerja">
                            <Icon name="LogOut" size={18} />
                            {isSidebarOpen && <span className="font-bold text-sm">Ganti Workspace</span>}
                        </button>
                    </div>
                </div>

                {/* CONTENT AREA */}
                <div className="flex-1 p-8 overflow-y-auto relative z-10">
                    <div className="max-w-7xl mx-auto">
                        {activeTab === 'dashboard' && renderDashboard()}
                        {activeTab === 'progress' && renderProgressTable()}
                        {activeTab === 'invoice' && renderInvoiceTable()}
                        {activeTab === 'setting' && renderSettings()}
                        {activeTab === 'jobcode' && renderJobcodeSettings()}
                        {activeTab === 'rekening' && renderBankAccountSettings()}
                    </div>
                </div>

                {/* FLOATING CHAT AI */}
                <div className="fixed bottom-6 right-6 z-[60]">
                    {isChatOpen ? (
                        <div className="bg-white w-80 sm:w-96 h-[30rem] rounded-2xl shadow-2xl flex flex-col border border-purple-100 chat-slide-up">
                            <div className="bg-gradient-to-r from-purple-600 to-indigo-600 p-4 text-white flex justify-between items-center shadow-md">
                                <div className="flex items-center space-x-2"><div className="bg-white/20 p-2 rounded-lg"><Icon name="Bot" size={20} /></div><div><h3 className="font-bold text-sm">HRI AI Assistant ✨</h3><p className="text-[10px] text-purple-100">Ketik untuk bertanya</p></div></div>
                                <button onClick={() => setIsChatOpen(false)} className="hover:bg-white/20 p-1.5 rounded-md"><Icon name="X" size={16}/></button>
                            </div>
                            <div className="flex-1 p-4 overflow-y-auto bg-gray-50 space-y-4">
                                {chatHistory.map((msg, i) => (<div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}><div className={`max-w-[85%] p-3 rounded-2xl text-sm shadow-sm ${msg.role === 'user' ? 'bg-purple-600 text-white rounded-br-none' : 'bg-white border border-gray-100 text-gray-700 rounded-bl-none'}`}>{msg.text}</div></div>))}
                                {isChatLoading && (<div className="flex justify-start"><div className="max-w-[85%] p-3 rounded-2xl bg-white border border-gray-100 text-gray-500 rounded-bl-none text-sm flex space-x-2"><div className="flex space-x-1"><div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0.1s'}}></div><div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div></div></div></div>)}
                                <div ref={chatEndRef} />
                            </div>
                            <div className="p-3 bg-white border-t border-gray-100">
                                <form onSubmit={(e) => { e.preventDefault(); handleSendChat(); }} className="flex items-center space-x-2 bg-gray-50 border rounded-xl px-2 py-1 focus-within:ring-2 focus-within:ring-purple-500">
                                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Tanya sesuatu..." disabled={isChatLoading} className="flex-1 bg-transparent border-none focus:outline-none px-2 py-2 text-sm text-gray-700" />
                                    <button type="submit" disabled={!chatInput.trim() || isChatLoading} className="bg-purple-600 text-white p-2 rounded-lg hover:bg-purple-700 disabled:bg-gray-300 disabled:cursor-not-allowed"><Icon name="Send" size={14} /></button>
                                </form>
                            </div>
                        </div>
                    ) : (
                        <button onClick={() => setIsChatOpen(true)} className="bg-purple-600 text-white p-4 rounded-full shadow-2xl hover:bg-purple-700 hover:scale-110 transition-all duration-300 relative group">
                            <Icon name="MessageCircle" size={24} />
                            <span className="absolute -top-1 -right-1 flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-purple-500"></span></span>
                        </button>
                    )}
                </div>

                {/* MODAL 1: MAGIC INPUT */}
                {isMagicModalOpen && (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-lg">
                        <div className="flex justify-between items-center p-5 border-b bg-purple-50 rounded-t-xl"><h3 className="text-lg font-bold text-purple-800 flex items-center"><Icon name="Sparkles" size={20} className="mr-2"/> ✨ Magic Input Invoice</h3><button onClick={() => setIsMagicModalOpen(false)} className="text-purple-400 hover:text-purple-600"><Icon name="X" size={20}/></button></div>
                        <div className="p-6 space-y-4"><p className="text-sm text-gray-600">Salin instruksi dari WhatsApp/Email. AI akan mengisi form otomatis.</p><textarea value={magicText} onChange={(e) => setMagicText(e.target.value)} placeholder="Tolong buatkan invoice untuk PT Sejahtera..." className="w-full h-40 p-4 border border-purple-200 rounded-lg outline-none focus:ring-2 focus:ring-purple-500 bg-purple-50/20 text-sm resize-none"></textarea></div>
                        <div className="flex justify-end p-4 border-t bg-gray-50 rounded-b-xl space-x-3"><button onClick={() => setIsMagicModalOpen(false)} className="px-5 py-2 text-gray-600 hover:bg-gray-200 rounded-lg">Batal</button><button onClick={handleMagicParse} disabled={isMagicLoading || !magicText.trim()} className="px-5 py-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold rounded-lg hover:from-purple-700 flex items-center">{isMagicLoading ? <Icon name="Sync" size={16} className="animate-spin mr-2"/> : <Icon name="Sparkles" size={16} className="mr-2"/>} Ekstrak</button></div>
                    </div>
                    </div>
                )}

                {/* MODAL 2: INVOICE FORM */}
                {isInvoiceModalOpen && (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-5xl max-h-[90vh] overflow-y-auto">
                        <div className="flex justify-between items-center p-6 border-b sticky top-0 bg-white z-10"><h3 className="text-xl font-bold text-gray-800 flex items-center"><Icon name="Database" size={20} className="mr-2 text-blue-600"/> {invoiceForm.id ? 'Edit Invoice' : 'Form Input Invoice'}</h3></div>
                        {invoiceError && (<div className="mx-6 mt-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg flex items-center space-x-2"><Icon name="AlertCircle" size={20} /><span className="font-medium text-sm">{invoiceError}</span></div>)}
                        <form onSubmit={handleSaveInvoice} className="p-6">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="space-y-5">
                                <h4 className="font-bold text-gray-800 border-b pb-2 flex items-center"><Icon name="FileText" size={18} className="mr-2 text-blue-600"/> Informasi Dokumen</h4>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">No. Invoice</label><input required type="text" name="noInvoice" value={invoiceForm.noInvoice} onChange={handleInvoiceFormChange} className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" placeholder="HRI-INV-..." /></div>
                                <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-medium text-gray-700 mb-1">No. Faktur Pajak</label><input type="text" name="noFakturPajak" value={invoiceForm.noFakturPajak} onChange={handleInvoiceFormChange} className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" /></div><div><label className="block text-sm font-medium text-gray-700 mb-1">Pembetulan Ke-</label><input type="text" name="pembetulanFaktur" value={invoiceForm.pembetulanFaktur} onChange={handleInvoiceFormChange} className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" placeholder="0" /></div></div>
                                <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-medium text-gray-700 mb-1">Tgl. Terbit</label><input required type="date" name="date" value={invoiceForm.date} onChange={handleInvoiceFormChange} className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" /></div><div><label className="block text-sm font-medium text-gray-700 mb-1">Jenis Pekerjaan</label><input readOnly type="text" name="type" value={invoiceForm.type} className="w-full border border-gray-300 rounded-md p-2 outline-none bg-gray-100 text-gray-500" /></div></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2"><label className="block text-sm font-medium text-blue-700 mb-1 flex items-center"><Icon name="Briefcase" size={14} className="mr-1"/> Nama Pekerjaan (Lookup Master)</label><input list="jobcode-list" name="namaPekerjaanLookup" value={invoiceForm.namaPekerjaanLookup} onChange={handleInvoiceFormChange} placeholder="Ketik atau pilih pekerjaan..." autoComplete="off" className="w-full border border-blue-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500 bg-blue-50" /><datalist id="jobcode-list">{jobcodes.map(j => <option key={j.id} value={j.namaPekerjaan}>{j.jobcode}</option>)}</datalist></div>
                                    <div className="col-span-2"><label className="block text-sm font-medium text-gray-700 mb-1">Pelanggan</label><select required name="customerName" value={invoiceForm.customerName} onChange={handleInvoiceFormChange} disabled={isCustomerLocked} className={`w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500 ${isCustomerLocked ? 'bg-gray-100 text-gray-600 font-semibold' : 'bg-white'}`}><option value="">-- Pilih --</option>{customers.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
                                    <div className="col-span-2"><label className="block text-sm font-medium text-gray-700 mb-1">Periode Progress (Opsional)</label><input list="periode-list" name="periodeProgress" value={invoiceForm.periodeProgress} onChange={handleInvoiceFormChange} className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" /><datalist id="periode-list">{uniqueProgressPeriods.map(period => <option key={period} value={period} />)}</datalist></div>
                                    <div className="col-span-2 bg-blue-50 p-3 rounded-lg border border-blue-100 mt-2"><label className="block text-sm font-semibold text-blue-800 mb-2">Penyerahan &amp; Jatuh Tempo</label><div className="grid grid-cols-2 gap-4 items-center"><div><label className="block text-xs font-medium text-gray-600 mb-1">Tgl Penyerahan</label><input required type="date" name="tglPenyerahan" value={invoiceForm.tglPenyerahan} onChange={handleInvoiceFormChange} className="w-full border border-blue-200 rounded-md p-1.5 text-sm outline-none focus:ring-2 focus:ring-blue-500" /></div><div className="text-right"><label className="block text-xs font-medium text-gray-600 mb-1">Jatuh Tempo ({previewTermin} Hari)</label><span className="font-bold text-blue-900 text-lg">{formatDate(previewJatuhTempoStr)}</span></div></div></div>
                                </div>
                                <div><div className="flex justify-between items-center mb-1"><label className="block text-sm font-medium text-gray-700">Keterangan / Deskripsi</label><button type="button" onClick={generateInvoiceDesc} disabled={!isOnline || isGeneratingDesc} className="text-[10px] bg-purple-100 text-purple-700 px-2 py-1 rounded"><Icon name="Sparkles" size={10} className="mr-1" /> ✨ Auto</button></div><textarea required name="desc" value={invoiceForm.desc} onChange={handleInvoiceFormChange} rows="3" className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500"></textarea></div>
                            </div>
                            
                            <div className="space-y-5 bg-gray-50 p-5 rounded-xl border border-gray-200">
                                <h4 className="font-bold text-gray-800 border-b pb-2 flex items-center"><Icon name="Calculator" size={18} className="mr-2 text-blue-600"/> Kalkulasi Finansial</h4>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Harga Jual / DPP (Rp)</label><input type="text" required name="hargaJual" value={formatRibuan(invoiceForm.hargaJual)} onChange={(e) => handleNumberInput(e, 'hargaJual')} className="w-full border border-gray-300 rounded-md p-2.5 text-right font-bold text-gray-800 outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Pengurang Sebelum PPN (Rp)</label><input type="text" name="pengurangSblm" value={formatRibuan(invoiceForm.pengurangSblm)} onChange={(e) => handleNumberInput(e, 'pengurangSblm')} className="w-full border border-gray-300 rounded-md p-2 text-right outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                
                                {(invoiceForm.type || '').toUpperCase() === 'PENJUALAN ASSET' && (
                                    <div className="bg-yellow-50 border border-yellow-200 p-3 rounded-md">
                                        <label className="block text-xs font-bold text-yellow-800 mb-1">Tarif PPN Asset:</label>
                                        <select name="ppnRate" value={invoiceForm.ppnRate} onChange={handleInvoiceFormChange} className="w-full border border-yellow-300 rounded-md p-1.5 text-sm outline-none bg-white">
                                            <option value={0.11}>11% - dari (11/12 x 12%)</option>
                                            <option value={0.12}>12% - Full</option>
                                        </select>
                                    </div>
                                )}
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-blue-50 p-3 rounded-md border border-blue-100">
                                        <label className="block text-xs font-semibold text-blue-800 mb-1">PPN (Otomatis)</label>
                                        <div className="text-right font-bold text-blue-900">{formatIDR(invoiceForm.ppn)}</div>
                                        <div className="text-[10px] text-blue-600 text-right mt-1">
                                            {((invoiceForm.type || '').toUpperCase() === 'PENJUALAN ASSET' && Number(invoiceForm.ppnRate) === 0.12) ? '12%' : '11/12 x 12%'} dari Dasar
                                        </div>
                                    </div>
                                    <div className="bg-red-50 p-3 rounded-md border border-red-100">
                                        <label className="block text-xs font-semibold text-red-800 mb-1">PPh Psl 23 (Otomatis)</label>
                                        <div className="text-right font-bold text-red-900">{formatIDR(invoiceForm.pph23)}</div>
                                        <div className="text-[10px] text-red-600 text-right mt-1">
                                            {((invoiceForm.type || '').toUpperCase() === 'PENJUALAN ASSET' || (invoiceForm.type || '').toUpperCase() === 'SPAREPART') ? 'Bebas PPh' : '2%'}
                                        </div>
                                    </div>
                                </div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Pengurang Setelah PPN (Rp)</label><input type="text" name="pengurangStlh" value={formatRibuan(invoiceForm.pengurangStlh)} onChange={(e) => handleNumberInput(e, 'pengurangStlh')} className="w-full border border-gray-300 rounded-md p-2 text-right outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                <div className="pt-4 border-t border-gray-200"><div className="flex justify-between items-center bg-gray-800 text-white p-4 rounded-lg shadow-inner"><span className="font-semibold">TOTAL INVOICE</span><span className="text-xl font-bold tracking-wider">{formatIDR(previewTotalInvoice)}</span></div></div>
                            </div>
                        </div>
                        <div className="flex justify-end pt-8 mt-4 border-t border-gray-100 space-x-3"><button type="button" onClick={() => { setIsInvoiceModalOpen(false); setInvoiceError(''); }} className="px-6 py-2.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">Batal</button><button type="submit" className="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 flex items-center shadow-md"><Icon name="Save" size={18} className="mr-2" /> Simpan Invoice</button></div>
                        </form>
                    </div>
                    </div>
                )}

                {/* MODAL 3: PAYMENT FORM */}
                {isPaymentModalOpen && (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
                        <div className="flex justify-between items-center p-5 border-b bg-green-50 rounded-t-xl sticky top-0 z-10"><h3 className="text-lg font-bold text-green-800 flex items-center"><Icon name="CreditCard" size={20} className="mr-2"/> Update Pembayaran</h3></div>
                        <div className="p-6 space-y-4">
                            <div className="flex justify-between items-center bg-gray-50 p-4 rounded-lg border border-gray-200"><div><p className="text-xs text-gray-500">Total Tagihan (Stlh PPh)</p><p className="font-bold text-lg text-gray-800">{formatIDR(paymentForm.totalSetelahPph)}</p></div><div className="text-right"><p className="text-xs text-gray-500">Sisa Piutang Saat Ini</p><p className="font-bold text-lg text-red-600">{formatIDR(paymentForm.totalSetelahPph - paymentForm.history.reduce((s, h) => s + Number(h.danaMasuk) + Number(h.backcharge), 0))}</p></div></div>
                            {paymentForm.history.length > 0 && (
                                <div className="border border-green-200 rounded-lg overflow-hidden">
                                    <div className="bg-green-100 text-green-800 text-xs font-bold px-3 py-2">Riwayat Pembayaran</div>
                                    <table className="w-full text-xs text-left"><thead className="bg-green-50 text-gray-600"><tr><th className="px-3 py-2">Tanggal</th><th className="px-3 py-2 text-right">Dana Masuk</th><th className="px-3 py-2 text-right">Admin</th><th className="px-3 py-2 text-center">Aksi</th></tr></thead><tbody>
                                        {paymentForm.history.map(h => (<tr key={h.id} className="border-t border-green-50 hover:bg-green-50"><td className="px-3 py-2">{formatDate(h.tglPembayaran)}<br/><span className="text-[9px] text-gray-400">{h.namaBank}</span></td><td className="px-3 py-2 text-right font-medium text-green-700">{formatIDR(h.danaMasuk)}</td><td className="px-3 py-2 text-right text-gray-500">{formatIDR(h.backcharge)}</td><td className="px-3 py-2 text-center"><button type="button" onClick={() => setPaymentForm(prev => ({...prev, history: prev.history.filter(item => item.id !== h.id)}))} className="text-red-400 hover:text-red-600 transition"><Icon name="Trash2" size={14} /></button></td></tr>))}
                                    </tbody></table>
                                </div>
                            )}
                            <div className="border border-gray-200 rounded-lg p-4 bg-white shadow-sm mt-4">
                                <h4 className="text-sm font-bold text-gray-700 mb-3 border-b pb-2">Input Pembayaran Baru</h4>
                                <div className="mb-4 bg-gray-50 p-3 rounded border border-gray-200"><label className="block text-sm font-semibold text-gray-700 mb-2">Pilih Rekening Perusahaan</label><select className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-green-500 text-sm bg-white" onChange={(e) => { const bank = bankAccounts.find(b => b.id === e.target.value); if(bank) setPaymentForm({...paymentForm, namaBankBaru: bank.namaBank, rekeningBankBaru: bank.noRekening}); else setPaymentForm({...paymentForm, namaBankBaru: '', rekeningBankBaru: ''}); }}><option value="">-- Manual / Pilih --</option>{bankAccounts.map(b => <option key={b.id} value={b.id}>{b.namaBank} - {b.noRekening}</option>)}</select></div>
                                <div className="grid grid-cols-2 gap-4 mb-3"><div><label className="block text-sm font-medium text-gray-700 mb-1">Nama Bank / Kas</label><input type="text" value={paymentForm.namaBankBaru} onChange={(e) => setPaymentForm({...paymentForm, namaBankBaru: e.target.value})} className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-green-500 text-sm" /></div><div><label className="block text-sm font-medium text-gray-700 mb-1">No. Rekening / Ref</label><input type="text" value={paymentForm.rekeningBankBaru} onChange={(e) => setPaymentForm({...paymentForm, rekeningBankBaru: e.target.value})} className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-green-500 text-sm" /></div></div>
                                <div className="grid grid-cols-2 gap-4 mb-3"><div><label className="block text-sm font-medium text-gray-700 mb-1">Dana Masuk (Rp)</label><input type="text" value={formatRibuan(paymentForm.danaMasukBaru)} onChange={(e) => setPaymentForm({...paymentForm, danaMasukBaru: parseRibuan(e.target.value)})} className="w-full border border-green-300 bg-green-50 rounded-md p-2 text-right font-bold text-green-700 outline-none focus:ring-2 focus:ring-green-500" /></div><div><label className="block text-sm font-medium text-gray-700 mb-1">Tgl Penerimaan</label><input type="date" value={paymentForm.tglPembayaranBaru} onChange={(e) => setPaymentForm({...paymentForm, tglPembayaranBaru: e.target.value})} className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-green-500" /></div></div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Backcharge / Potongan Bank (Rp)</label><input type="text" value={formatRibuan(paymentForm.backchargeBaru)} onChange={(e) => setPaymentForm({...paymentForm, backchargeBaru: parseRibuan(e.target.value)})} className="w-full border border-gray-300 rounded-md p-2 text-right outline-none focus:ring-2 focus:ring-green-500" /></div>
                            </div>
                        </div>
                        <div className="flex justify-end p-5 border-t bg-gray-50 rounded-b-xl space-x-3"><button type="button" onClick={() => setIsPaymentModalOpen(false)} className="px-5 py-2 bg-gray-200 text-gray-700 font-medium rounded-md hover:bg-gray-300 transition">Batal</button><button type="button" onClick={handleSavePayment} className="px-5 py-2 bg-green-600 text-white font-bold rounded-md hover:bg-green-700 transition">Simpan Pembayaran</button></div>
                    </div>
                    </div>
                )}

                {/* MODAL 4: PROGRESS FORM */}
                {isProgressModalOpen && (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                        <div className="flex justify-between items-center p-5 border-b sticky top-0 bg-white z-10"><h3 className="text-xl font-bold text-gray-800 flex items-center"><Icon name="TrendingUp" size={20} className="mr-2 text-blue-600"/> {progressForm.id ? 'Edit Progress' : 'Form Pengakuan Progress'}</h3></div>
                        <form onSubmit={handleSaveProgress} className="p-6 space-y-4">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Periode Progress</label><input required type="text" placeholder="Contoh: Januari 2026" value={progressForm.period} onChange={(e) => setProgressForm({...progressForm, period: e.target.value})} className="w-full border border-gray-300 rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            <div className="border border-gray-200 rounded-lg p-4 bg-gray-50">
                                <div className="flex justify-between items-center mb-3"><h4 className="font-bold text-gray-700 text-sm">Rincian Pekerjaan</h4><button type="button" onClick={handleAddProgressItem} className="text-xs bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1.5 rounded font-medium flex items-center"><Icon name="Plus" size={12} className="mr-1" /> Tambah Baris</button></div>
                                <div className="space-y-3">
                                    {progressForm.items.map((item, index) => (
                                        <div key={index} className="flex flex-col sm:flex-row gap-3 items-start sm:items-end bg-white p-3 border border-gray-200 rounded-md shadow-sm relative">
                                            <div className="flex-1 w-full"><label className="block text-xs font-semibold text-gray-600 mb-1">Nama Pekerjaan (Lookup Master)</label><input required list="progress-jobcode-list" value={item.project} onChange={(e) => handleProgressItemChange(index, 'project', e.target.value)} placeholder="Ketik/pilih..." autoComplete="off" className="w-full border border-blue-300 bg-blue-50 rounded-md p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                            <div className="w-full sm:w-1/3"><label className="block text-xs font-semibold text-gray-600 mb-1">Nilai Pengakuan (Rp)</label><input required type="text" value={formatRibuan(item.amount)} onChange={(e) => handleProgressItemChange(index, 'amount', parseRibuan(e.target.value))} className="w-full border border-gray-300 rounded-md p-2 text-sm text-right font-bold text-blue-600 outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                            {progressForm.items.length > 1 && (<div className="mt-2 sm:mt-0 pb-0.5"><button type="button" onClick={() => handleRemoveProgressItem(index)} className="p-2 bg-red-50 text-red-500 hover:bg-red-100 rounded-md transition border"><Icon name="Trash2" size={16} /></button></div>)}
                                        </div>
                                    ))}
                                    <datalist id="progress-jobcode-list">{jobcodes.map(j => <option key={j.id} value={j.namaPekerjaan}>{j.jobcode}</option>)}</datalist>
                                </div>
                                <div className="mt-4 pt-3 border-t flex justify-between items-center"><span className="font-semibold text-gray-700 text-sm">Total Periode Ini:</span><span className="text-xl font-extrabold text-blue-700">{formatIDR(progressForm.items.reduce((sum, it) => sum + (Number(it.amount)||0), 0))}</span></div>
                            </div>
                            <div className="flex justify-end pt-4 space-x-3 border-t"><button type="button" onClick={() => setIsProgressModalOpen(false)} className="px-6 py-2.5 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition">Batal</button><button type="submit" className="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-md hover:bg-blue-700 shadow-md">Simpan Progress</button></div>
                        </form>
                    </div>
                    </div>
                )}

                {/* MODAL 5: SETTING PELANGGAN */}
                {isSettingModalOpen && (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-md">
                        <div className="flex justify-between items-center p-5 border-b"><h3 className="text-lg font-bold text-gray-800">{settingForm.id ? 'Edit' : 'Tambah'} Pelanggan</h3></div>
                        <form onSubmit={handleSaveSetting} className="p-6 space-y-4">
                        <div><label className="block text-sm mb-1">Nama Pelanggan / PT</label><input required type="text" value={settingForm.name} onChange={(e) => setSettingForm({...settingForm, name: e.target.value})} className="w-full border rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" /></div>
                        <div><label className="block text-sm mb-1">Termin Pembayaran (Hari)</label><input required type="number" value={settingForm.term} onChange={(e) => setSettingForm({...settingForm, term: e.target.value})} className="w-full border rounded-md p-2 outline-none text-right focus:ring-2 focus:ring-blue-500" /></div>
                        <div className="flex justify-end pt-4 space-x-3"><button type="button" onClick={() => setIsSettingModalOpen(false)} className="px-6 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition">Batal</button><button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Simpan Data</button></div>
                        </form>
                    </div>
                    </div>
                )}

                {/* MODAL 6: SETTING JOBCODE */}
                {isJobcodeModalOpen && (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-md">
                        <div className="flex justify-between items-center p-5 border-b"><h3 className="text-lg font-bold text-gray-800">{jobcodeForm.id ? 'Edit' : 'Tambah'} Jobcode</h3></div>
                        <form onSubmit={handleSaveJobcode} className="p-6 space-y-4">
                        <div><label className="block text-sm mb-1">Jobcode</label><input required type="text" value={jobcodeForm.jobcode} onChange={(e) => setJobcodeForm({...jobcodeForm, jobcode: e.target.value})} className="w-full border rounded-md p-2 outline-none uppercase focus:ring-2 focus:ring-blue-500" /></div>
                        <div><label className="block text-sm mb-1">Nama Pekerjaan</label><input required type="text" value={jobcodeForm.namaPekerjaan} onChange={(e) => setJobcodeForm({...jobcodeForm, namaPekerjaan: e.target.value})} className="w-full border rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" /></div>
                        <div><label className="block text-sm mb-1">Pelanggan (Relasi)</label><select value={jobcodeForm.customerName} onChange={(e) => setJobcodeForm({...jobcodeForm, customerName: e.target.value})} className="w-full border rounded-md p-2 outline-none bg-white focus:ring-2 focus:ring-blue-500"><option value="">-- Multi Pelanggan --</option>{customers.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
                        <div><label className="block text-sm mb-1">Jenis Pekerjaan</label><select required value={jobcodeForm.type} onChange={(e) => setJobcodeForm({...jobcodeForm, type: e.target.value})} className="w-full border rounded-md p-2 outline-none bg-white focus:ring-2 focus:ring-blue-500"><option value="FULL PAKET">FULL PAKET</option><option value="HAULING">HAULING</option><option value="MSP/MSC">MSP/MSC</option><option value="RENTAL">RENTAL</option><option value="SPAREPART">SPAREPART</option><option value="PENJUALAN ASSET">PENJUALAN ASSET</option></select></div>
                        <div><label className="block text-sm mb-1">Lokasi Pekerjaan</label><input required type="text" value={jobcodeForm.lokasi} onChange={(e) => setJobcodeForm({...jobcodeForm, lokasi: e.target.value})} className="w-full border rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" /></div>
                        <div className="flex justify-end pt-4 space-x-3"><button type="button" onClick={() => setIsJobcodeModalOpen(false)} className="px-6 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition">Batal</button><button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Simpan Data</button></div>
                        </form>
                    </div>
                    </div>
                )}

                {/* MODAL 7: BANK ACCOUNT */}
                {isBankAccountModalOpen && (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-md">
                        <div className="flex justify-between items-center p-5 border-b"><h3 className="text-lg font-bold text-gray-800">{bankAccountForm.id ? 'Edit' : 'Tambah'} Rekening Bank</h3></div>
                        <form onSubmit={handleSaveBankAccount} className="p-6 space-y-4">
                        <div><label className="block text-sm mb-1">Nama Bank</label><input required type="text" value={bankAccountForm.namaBank} onChange={(e) => setBankAccountForm({...bankAccountForm, namaBank: e.target.value})} className="w-full border rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" /></div>
                        <div><label className="block text-sm mb-1">Nomor Rekening</label><input required type="text" value={bankAccountForm.noRekening} onChange={(e) => setBankAccountForm({...bankAccountForm, noRekening: e.target.value})} className="w-full border rounded-md p-2 outline-none focus:ring-2 focus:ring-blue-500" /></div>
                        <div><label className="block text-sm mb-1">Atas Nama</label><input required type="text" value={bankAccountForm.atasNama} onChange={(e) => setBankAccountForm({...bankAccountForm, atasNama: e.target.value})} className="w-full border rounded-md p-2 outline-none uppercase focus:ring-2 focus:ring-blue-500" /></div>
                        <div className="flex justify-end pt-4 space-x-3"><button type="button" onClick={() => setIsBankAccountModalOpen(false)} className="px-6 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition">Batal</button><button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Simpan Rekening</button></div>
                        </form>
                    </div>
                    </div>
                )}

                {/* MODAL 8: EMAIL DRAFT */}
                {emailModal.isOpen && (
                    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="flex justify-between items-center p-5 border-b bg-purple-50"><div className="flex items-center space-x-2 text-purple-800"><Icon name="Sparkles" size={20} /><h3 className="text-lg font-bold">✨ AI Draft Email</h3></div></div>
                        <div className="p-6 flex-1 overflow-y-auto">
                        {emailModal.isLoading ? (<div className="flex justify-center py-10"><div className="animate-spin rounded-full h-10 w-10 border-b-2 border-purple-600"></div></div>) : (<div className="relative group"><textarea readOnly className="w-full h-64 p-4 bg-gray-50 border rounded-lg outline-none text-sm text-gray-700 font-serif" value={emailModal.draft} /><button onClick={() => { document.execCommand('copy'); navigator.clipboard.writeText(emailModal.draft); setEmailModal(prev => ({...prev, isCopied: true})); setTimeout(() => setEmailModal(prev => ({...prev, isCopied: false})), 2000); }} className="absolute top-3 right-3 p-2 bg-white shadow-sm border rounded-md flex items-center space-x-2"><Icon name={emailModal.isCopied ? "CheckCircle2" : "Copy"} size={16} className={emailModal.isCopied ? "text-green-500" : ""} /><span className="text-xs">{emailModal.isCopied ? 'Tersalin!' : 'Salin'}</span></button></div>)}
                        <div className="flex justify-end pt-4 mt-4 border-t"><button onClick={() => setEmailModal({ isOpen: false, data: null, draft: '' })} className="px-6 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300">Tutup</button></div>
                        </div>
                    </div>
                    </div>
                )}

                {/* MODAL 9: AI CUSTOMER INSIGHT */}
                {customerInsightModal.isOpen && (
                    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="flex justify-between items-center p-5 border-b bg-indigo-50"><div className="flex items-center space-x-2 text-indigo-800"><Icon name="Sparkles" size={20} /><h3 className="text-lg font-bold">✨ Analisis Risiko Klien</h3></div></div>
                        <div className="p-6 flex-1 overflow-y-auto">
                        {customerInsightModal.isLoading ? (<div className="flex justify-center py-10"><div className="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div></div>) : (<div className="p-4 bg-gray-50 border rounded-lg text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">{customerInsightModal.insight}</div>)}
                        <div className="flex justify-end pt-4 mt-4 border-t"><button onClick={() => setCustomerInsightModal({ isOpen: false, customerName: '', insight: '', isLoading: false })} className="px-6 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300">Tutup</button></div>
                        </div>
                    </div>
                    </div>
                )}

                {/* MODAL 10: CONFIRMATION */}
                {confirmModal.isOpen && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[60]">
                        <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6">
                            <div className="flex items-center space-x-3 mb-4 text-red-600"><Icon name="AlertCircle" size={24} /><h3 className="text-lg font-bold text-gray-800">{confirmModal.title}</h3></div>
                            <p className="text-sm text-gray-600 mb-6 leading-relaxed">{confirmModal.message}</p>
                            <div className="flex justify-end space-x-3"><button onClick={() => setConfirmModal({isOpen: false, title: '', message: '', onConfirm: null})} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200">Batal</button><button onClick={() => { confirmModal.onConfirm(); setConfirmModal({isOpen: false, title: '', message: '', onConfirm: null}); }} className="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 shadow-sm">Ya, Lanjutkan</button></div>
                        </div>
                    </div>
                )}

                {/* TOAST NOTIFICATION */}
                {toast.show && (<div className={`fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-3 rounded-lg shadow-lg text-white font-medium flex items-center space-x-2 transition-all duration-300 ${toast.type === 'success' ? 'bg-green-600' : 'bg-red-600'}`}><Icon name={toast.type === 'success' ? "CheckCircle2" : "AlertCircle"} size={20} /><span>{toast.message}</span></div>)}
                </div>
            );
        }

        // ============================================================================
        // 5. KOMPONEN: LOGIN / PILIH DATABASE
        // ============================================================================
        function LoginScreen({ onSelectProfile }) {
            const [profiles, setProfiles] = useState([]);
            const [newProfileName, setNewProfileName] = useState('');
            const [isCreating, setIsCreating] = useState(false);

            useEffect(() => {
                try {
                    const data = localStorage.getItem('hri_profiles');
                    const parsed = data ? JSON.parse(data) : [];
                    setProfiles(Array.isArray(parsed) ? parsed : []);
                } catch (e) {
                    console.error("Local storage terdeteksi rusak/corrupt. Membersihkan cache...");
                    setProfiles([]);
                }
            }, []);

            const handleCreate = (e) => {
                e.preventDefault();
                if (!newProfileName.trim()) return;
                
                const id = 'DB_' + Date.now();
                const newProfile = { id, name: newProfileName.trim(), createdAt: new Date().toISOString() };
                const updated = [...profiles, newProfile];
                
                try {
                    localStorage.setItem('hri_profiles', JSON.stringify(updated));
                    setProfiles(updated);
                } catch(err) {
                    alert("Gagal menyimpan ke memori lokal browser Anda.");
                }
                
                setNewProfileName('');
                setIsCreating(false);
            };

            const handleDelete = (e, profileId) => {
                e.stopPropagation(); // Mencegah klik masuk ke database
                if (window.confirm("Yakin ingin menghapus database ini? Semua data didalamnya akan terhapus dari browser ini secara permanen.")) {
                    const updated = profiles.filter(p => p.id !== profileId);
                    localStorage.setItem('hri_profiles', JSON.stringify(updated));
                    setProfiles(updated);
                    // Hapus IndexedDB aslinya
                    indexedDB.deleteDatabase(`HRI_DB_${profileId}`);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
                    <div className="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-xl animate-fade-in">
                        <div className="text-center">
                            <div className="mx-auto h-16 w-16 bg-blue-100 text-blue-600 flex items-center justify-center rounded-full mb-4">
                                <i className="fas fa-database text-3xl"></i>
                            </div>
                            <h2 className="mt-2 text-3xl font-extrabold text-gray-900">HRI Finance</h2>
                            <p className="mt-2 text-sm text-gray-500">Pilih Ruang Kerja (Database) untuk memulai.</p>
                        </div>

                        {profiles.length > 0 ? (
                            <div className="space-y-3 mt-8 max-h-64 overflow-y-auto pr-2">
                                <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Database Tersedia</p>
                                {profiles.map(p => (
                                    <div key={p.id} onClick={() => onSelectProfile(p)} className="flex items-center justify-between p-4 border border-gray-200 rounded-xl cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition group">
                                        <div className="flex items-center space-x-3">
                                            <div className="bg-gray-100 p-2 rounded-lg group-hover:bg-blue-200 group-hover:text-blue-700 transition">
                                                <i className="fas fa-building text-lg"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-gray-800">{p.name}</h3>
                                                <p className="text-[10px] text-gray-400">Dibuat: {formatDate(p.createdAt)}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center space-x-2">
                                            <button onClick={(e) => handleDelete(e, p.id)} className="text-red-300 hover:text-red-600 p-2 transition opacity-0 group-hover:opacity-100" title="Hapus Database">
                                                <i className="fas fa-trash-alt"></i>
                                            </button>
                                            <i className="fas fa-arrow-right text-gray-300 group-hover:text-blue-500"></i>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-6 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                                <p className="text-sm text-gray-500">Belum ada database yang dibuat.</p>
                            </div>
                        )}

                        <div className="pt-4 border-t border-gray-100">
                            {!isCreating ? (
                                <button onClick={() => setIsCreating(true)} className="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-blue-700 bg-blue-50 hover:bg-blue-100 transition focus:outline-none">
                                    <i className="fas fa-plus mr-2"></i> Buat Ruang Kerja Baru
                                </button>
                            ) : (
                                <form onSubmit={handleCreate} className="space-y-4 animate-fade-in bg-gray-50 p-4 rounded-xl border border-gray-200">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 mb-1">Nama Perusahaan / Proyek</label>
                                        <input autoFocus required type="text" value={newProfileName} onChange={(e) => setNewProfileName(e.target.value)} placeholder="Contoh: PT Hasil Rimba (Pusat)" className="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
                                    </div>
                                    <div className="flex space-x-2">
                                        <button type="button" onClick={() => setIsCreating(false)} className="flex-1 py-2 px-4 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">Batal</button>
                                        <button type="submit" className="flex-1 py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">Simpan</button>
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // 6. KOMPONEN UTAMA (ROUTER SEDERHANA)
        // ============================================================================
        function AppWrapper() {
            const [activeProfile, setActiveProfile] = useState(null);

            const handleSelectProfile = async (profile) => {
                try {
                    await initDB(profile.id);
                    setActiveProfile(profile);
                } catch (err) {
                    alert("Gagal memuat database lokal. Pastikan memori browser Anda tidak penuh atau di-block.");
                }
            };

            const handleLogout = () => {
                currentDbPromise = null;
                setActiveProfile(null);
            };

            return (
                <ErrorBoundary>
                    {!activeProfile ? (
                        <LoginScreen onSelectProfile={handleSelectProfile} />
                    ) : (
                        <MainApp profile={activeProfile} onLogout={handleLogout} />
                    )}
                </ErrorBoundary>
            );
        }

        // Jalankan React setelah DOM dimuat dengan aman
        window.onload = () => {
            const rootElement = document.getElementById('root');
            // Menghapus tulisan "Memuat Aplikasi..."
            rootElement.innerHTML = '';
            
            try {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<AppWrapper />);
            } catch (err) {
                rootElement.innerHTML = `<div style="padding:20px; color:red; font-family:sans-serif;"><b>Gagal Menjalankan React!</b><br/><br/>Pesan: ${err.message}<br/><br/>Kemungkinan file CDN terblokir oleh Firewall perusahaan Anda.</div>`;
            }
        };
    </script>
</body>
</html>
