<!DOCTYPE html>

    <!-- Memuat Tailwind CSS untuk Desain -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Memuat React & ReactDOM dari CDNJS (Lebih Stabil & Cepat) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Memuat Babel dari CDNJS -->

</head>
<body>
    <div id="root">
        <!-- Indikator Loading awal sebelum React aktif -->
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #4B5563;">
            <div style="text-align: center;">
                <h2 style="margin-bottom: 10px; font-weight: bold;">Memuat Aplikasi HRI Finance...</h2>
                <p style="font-size: 14px; color: #6B7280;">Mohon tunggu, memastikan koneksi stabil.</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, Fragment } = React;

        // ============================================================================
        // 0. SISTEM PELINDUNG ERROR (ERROR BOUNDARY)
        // ============================================================================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) {
                console.error("Sistem Mencegah Crash Layar Blank:", error, errorInfo);
                this.setState({ error, errorInfo });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 text-gray-800">
                            <div className="bg-white p-8 rounded-xl shadow-xl max-w-2xl w-full border-t-4 border-red-500">
                                <div className="flex items-center space-x-3 text-red-600 mb-4">
                                    <i className="fas fa-exclamation-triangle text-3xl"></i>
                                    <h1 className="text-2xl font-bold">Terjadi Kendala Sistem</h1>
                                </div>
                                <p className="mb-6 text-gray-600">Aplikasi dicegah menjadi "Layar Blank". Kami menemukan kesalahan pada sistem atau data lokal. Silakan muat ulang halaman atau hapus cache browser jika masalah berlanjut.</p>
                                <button onClick={() => window.location.reload()} className="px-5 py-2.5 bg-red-600 text-white font-bold rounded-lg shadow hover:bg-red-700 transition">
                                    <i className="fas fa-sync-alt mr-2"></i> Muat Ulang Halaman
                                </button>
                                <details className="mt-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                                    <summary className="font-semibold cursor-pointer text-sm text-gray-700">Lihat Detail Kode Error (Untuk Tim IT)</summary>
                                    <pre className="mt-3 text-[11px] overflow-auto text-red-700 whitespace-pre-wrap">{this.state.error && this.state.error.toString()}</pre>
                                    <pre className="mt-2 text-[10px] overflow-auto text-gray-500 whitespace-pre-wrap">{this.state.errorInfo && this.state.errorInfo.componentStack}</pre>
                                </details>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ============================================================================
        // 1. PENGATURAN API GEMINI AI
        // ============================================================================
        // PENTING: Biarkan kosong "" jika dijalankan dari web preview sini.
        // Jika Anda simpan ke laptop (dijalankan tanpa internet / local server pribadi), isi dengan API Key Anda sendiri!
        const apiKey = ""; 

        const callGemini = async (prompt) => {
            // PERBAIKAN: Menggunakan endpoint gemini-2.5-flash-preview agar tidak error 404
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "Anda adalah asisten keuangan profesional perusahaan bernama HRI Finance. Jawablah selalu dalam Bahasa Indonesia yang formal, profesional, ringkas, dan sopan." }] }
            };
            
            let retries = 0;
            const maxRetries = 5;
            const delays = [1000, 2000, 4000, 8000, 16000];

            while (retries <= maxRetries) {
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, AI tidak dapat menghasilkan teks saat ini.";
                } catch (error) {
                    if (retries === maxRetries) return `Gagal terhubung ke AI. Pastikan internet Anda aktif dan API Key valid terisi jika di lokal. Error: ${error.message}`;
                    await new Promise(res => setTimeout(res, delays[retries]));
                    retries++;
                }
            }
        };

        // ============================================================================
        // 2. SISTEM DATABASE BROWSER OFFLINE DINAMIS (INDEXED DB)
        // ============================================================================
        let currentDbPromise = null;
        let dbListeners = { customers: [], jobcodes: [], progresses: [], invoices: [], bank_accounts: [] };

        const initDB = (dbName) => {
            dbListeners = { customers: [], jobcodes: [], progresses: [], invoices: [], bank_accounts: [] };
            currentDbPromise = new Promise((resolve) => {
                const req = indexedDB.open(`HRI_DB_${dbName}`, 3); 
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    ['customers', 'jobcodes', 'progresses', 'invoices', 'bank_accounts'].forEach(store => {
                        if (!db.objectStoreNames.contains(store)) db.createObjectStore(store, { keyPath: 'id' });
                    });
                };
                req.onsuccess = () => resolve(req.result);
            });
            return currentDbPromise;
        };

        const notifyDb = async (storeName) => {
            if (!currentDbPromise) return;
            const db = await currentDbPromise;
            const tx = db.transaction(storeName, 'readonly');
            const req = tx.objectStore(storeName).getAll();
            req.onsuccess = () => {
                let data = req.result;
                if (storeName === 'progresses') {
                    data.sort((a, b) => {
                        const idxA = a.sortIndex !== undefined ? a.sortIndex : new Date(a.createdAt||0).getTime() / 1000000;
                        const idxB = b.sortIndex !== undefined ? b.sortIndex : new Date(b.createdAt||0).getTime() / 1000000;
                        return idxA - idxB;
                    });
                } else {
                    data.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0)); 
                }
                if (dbListeners[storeName]) {
                    dbListeners[storeName].forEach(cb => cb(data));
                }
            };
        };

        const onSnapshotData = (storeName, callback) => {
            if (!dbListeners[storeName]) dbListeners[storeName] = [];
            dbListeners[storeName].push(callback);
            notifyDb(storeName);
            return () => { if(dbListeners[storeName]) dbListeners[storeName] = dbListeners[storeName].filter(cb => cb !== callback); };
        };

        const addData = async (storeName, data) => {
            const db = await currentDbPromise;
            const generatedId = Date.now().toString() + Math.floor(Math.random()*1000);
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).add({ ...data, id: generatedId });
                tx.oncomplete = () => { notifyDb(storeName); resolve(generatedId); };
                tx.onerror = (e) => reject(e);
            });
        };

        const updateData = async (storeName, id, data) => {
            const db = await currentDbPromise;
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                const req = store.get(id);
                req.onsuccess = () => { store.put({ ...req.result, ...data, id: id }); };
                tx.oncomplete = () => { notifyDb(storeName); resolve(); };
                tx.onerror = (e) => reject(e);
            });
        };

        const deleteData = async (storeName, id) => {
            const db = await currentDbPromise;
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).delete(id);
                tx.oncomplete = () => { notifyDb(storeName); resolve(); };
                tx.onerror = (e) => reject(e);
            });
        };

        const deleteMultipleData = async (storeName, ids) => {
            const db = await currentDbPromise;
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                ids.forEach(id => store.delete(id));
                tx.oncomplete = () => { notifyDb(storeName); resolve(); };
                tx.onerror = (e) => reject(e);
            });
        };

        // ============================================================================
        // 3. KOMPONEN ICON & UTILS
        // ============================================================================
        const Icon = ({ name, size = 18, className = "" }) => {
            const map = {
                LayoutDashboard: 'fas fa-tachometer-alt', FileText: 'fas fa-file-alt', Receipt: 'fas fa-file-invoice-dollar', Settings: 'fas fa-cog',
                Briefcase: 'fas fa-briefcase', Plus: 'fas fa-plus', Save: 'fas fa-save', X: 'fas fa-times', DollarSign: 'fas fa-dollar-sign', 
                TrendingUp: 'fas fa-chart-line', AlertCircle: 'fas fa-exclamation-circle', Sparkles: 'fas fa-magic', Bot: 'fas fa-robot', 
                Copy: 'fas fa-copy', CheckCircle2: 'fas fa-check-circle', CreditCard: 'fas fa-credit-card', Edit: 'fas fa-edit', Trash2: 'fas fa-trash-alt',
                Ban: 'fas fa-ban', Database: 'fas fa-database', Calculator: 'fas fa-calculator', CalendarDays: 'fas fa-calendar-alt', 
                ChevronDown: 'fas fa-chevron-down', ChevronUp: 'fas fa-chevron-up', Download: 'fas fa-download', UploadCloud: 'fas fa-cloud-upload-alt',
                Menu: 'fas fa-bars', WifiOff: 'fas fa-wifi-slash', Wifi: 'fas fa-wifi', InfoCircle: 'fas fa-info-circle', Search: 'fas fa-search', 
                Calendar: 'fas fa-calendar', MessageCircle: 'fas fa-comment-dots', Paperclip: 'fas fa-paperclip', Send: 'fas fa-paper-plane', 
                Landmark: 'fas fa-university', Lock: 'fas fa-lock', Unlock: 'fas fa-unlock', ArrowUp: 'fas fa-arrow-up', ArrowDown: 'fas fa-arrow-down',
                Table: 'fas fa-table', Users: 'fas fa-users', Building: 'fas fa-building', LogOut: 'fas fa-sign-out-alt', ArrowRight: 'fas fa-arrow-right',
                Sync: 'fas fa-sync-alt'
            };
            return <i className={`${map[name] || 'fas fa-circle'} ${className}`} style={{ fontSize: size }}></i>;
        };

        const formatIDR = (value) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value || 0);
        const formatRibuan = (number) => (number === null || number === undefined || isNaN(number)) ? '' : number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        const parseRibuan = (text) => text ? parseInt(text.toString().replace(/\./g, ''), 10) || 0 : 0;
        const formatDate = (dateString) => {
            if (!dateString || dateString === '-') return '-';
            const d = new Date(dateString); return isNaN(d.getTime()) ? '-' : `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        };
        // PERBAIKAN: Fungsi untuk menyingkat nominal rupiah pada Grafik
        const formatShortIDR = (value) => {
            if (value >= 1e12) return 'Rp ' + (value / 1e12).toFixed(1).replace('.', ',') + ' T';
            if (value >= 1e9) return 'Rp ' + (value / 1e9).toFixed(1).replace('.', ',') + ' M';
            if (value >= 1e6) return 'Rp ' + (value / 1e6).toFixed(1).replace('.', ',') + ' Jt';
            if (value === 0) return '0';
            return formatIDR(value);
        };

        const downloadTemplateExcel = (type) => {
            let data = []; let filename = "";
            if (type === 'pelanggan') { data = [{ "Nama Pelanggan": "Contoh PT Sejahtera", "Termin Pembayaran (Hari)": 30 }]; filename = "Template_Pelanggan.xlsx"; }
            else if (type === 'jobcode') { data = [{ "Jobcode": "HRI-SBY", "Nama Pekerjaan": "Hauling Area Sebakis", "Jenis Pekerjaan": "HAULING", "Lokasi Pekerjaan": "Sebakis Area", "Nama Pelanggan": "Contoh PT Sejahtera" }]; filename = "Template_Jobcode.xlsx"; }
            else if (type === 'progress') { data = [{ "Periode": "Januari 2026", "Nama Pekerjaan": "Hauling Area Sebakis", "Nilai Pengakuan (Rp)": 50000000 }, { "Periode": "Januari 2026", "Nama Pekerjaan": "Rental Alat Berat", "Nilai Pengakuan (Rp)": 25000000 }]; filename = "Template_Progress.xlsx"; }
            else if (type === 'invoice') { data = [{ "No. Invoice": "INV-001", "No. Faktur Pajak": "010.000-26", "Pembetulan Ke-": 0, "Tgl. Terbit (YYYY-MM-DD)": "2026-01-01", "Tgl. Penyerahan (YYYY-MM-DD)": "2026-01-05", "Nama Pelanggan": "Contoh PT", "Nama Pekerjaan (Lookup Master)": "Hauling Area Sebakis", "Periode Progress": "Januari 2026", "Keterangan": "Pekerjaan Hauling", "Harga Jual": 10000000, "Pengurang Sebelum PPN": 0, "Tarif PPN (0.11/0.12)": 0.11, "Pengurang Setelah PPN": 0, "Dana Masuk (Rp)": 5000000, "Tgl Pembayaran (YYYY-MM-DD)": "2026-02-01", "Nama Bank": "BCA", "Rekening Bank": "1234567890", "Potongan/Backcharge (Rp)": 15000 }]; filename = "Template_Invoice.xlsx"; }
            
            if(typeof XLSX !== 'undefined') {
                const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Template"); XLSX.writeFile(wb, filename);
            } else {
                alert("Library Excel belum termuat sempurna. Coba lagi.");
            }
        };

        // ============================================================================
        // 4. APLIKASI UTAMA (MAIN APP)
        // ============================================================================
        function MainApp({ profile, onLogout }) {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [isDbConnected, setIsDbConnected] = useState(false);
            const [isOnline, setIsOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
            
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            
            const [showProgressDetails, setShowProgressDetails] = useState(false);
            const [showInvoiceDetails, setShowInvoiceDetails] = useState(false);
            const [showDanaMasukDetails, setShowDanaMasukDetails] = useState(false);
            const [showPiutangDetails, setShowPiutangDetails] = useState(false);
            const [selectedCustomerPiutang, setSelectedCustomerPiutang] = useState(null);

            const [isInvoiceModalOpen, setIsInvoiceModalOpen] = useState(false);
            const [isProgressModalOpen, setIsProgressModalOpen] = useState(false);
            const [isSettingModalOpen, setIsSettingModalOpen] = useState(false);
            const [isJobcodeModalOpen, setIsJobcodeModalOpen] = useState(false);
            const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);
            const [isBankAccountModalOpen, setIsBankAccountModalOpen] = useState(false);
            const [invoiceError, setInvoiceError] = useState('');
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

            const [aiInsight, setAiInsight] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [emailModal, setEmailModal] = useState({ isOpen: false, data: null, draft: '', isLoading: false, isCopied: false });
            const [customerInsightModal, setCustomerInsightModal] = useState({ isOpen: false, customerName: '', insight: '', isLoading: false });
            const [isGeneratingDesc, setIsGeneratingDesc] = useState(false);
            
            const [isMagicModalOpen, setIsMagicModalOpen] = useState(false);
            const [magicText, setMagicText] = useState('');
            const [isMagicLoading, setIsMagicLoading] = useState(false);
            
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatHistory, setChatHistory] = useState([{ role: 'ai', text: `Halo! Saya asisten AI. Ada yang bisa saya bantu terkait laporan ruang kerja ${profile?.name || 'Anda'} hari ini?` }]);
            const [chatInput, setChatInput] = useState('');
            const [isChatLoading, setIsChatLoading] = useState(false);
            const chatEndRef = useRef(null);

            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [isLoadingImport, setIsLoadingImport] = useState(false);

            const [searchTermInvoice, setSearchTermInvoice] = useState('');
            const [searchTermProgress, setSearchTermProgress] = useState('');
            const [searchTermCustomer, setSearchTermCustomer] = useState('');
            const [searchTermJobcode, setSearchTermJobcode] = useState('');
            const [searchTermBankAccount, setSearchTermBankAccount] = useState('');
            const [selectedInvoices, setSelectedInvoices] = useState([]);

            const showToast = (message, type = 'success') => { setToast({ show: true, message, type }); setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 4000); };

            const [customers, setCustomers] = useState([]);
            const [progresses, setProgresses] = useState([]);
            const [invoices, setInvoices] = useState([]);
            const [jobcodes, setJobcodes] = useState([]);
            const [bankAccounts, setBankAccounts] = useState([]);

            const initialInvoiceForm = { id: null, noInvoice: '', noFakturPajak: '', pembetulanFaktur: '', date: new Date().toISOString().split('T')[0], tglPenyerahan: new Date().toISOString().split('T')[0], customerName: '', desc: '', type: 'FULL PAKET', ppnRate: 0.11, jobcode: '', namaPekerjaanLookup: '', periodeProgress: '', hargaJual: 0, pengurangSblm: 0, pengurangStlh: 0, ppn: 0, pph23: 0, danaMasuk: 0, backcharge: 0, namaBank: '', rekeningBank: '' };
            const [invoiceForm, setInvoiceForm] = useState(initialInvoiceForm);
            
            const initialProgressForm = { id: null, period: '', items: [{ project: '', jobcode: '', amount: 0 }] };
            const [progressForm, setProgressForm] = useState(initialProgressForm);
            
            const initialSettingForm = { id: null, name: '', term: 30 };
            const [settingForm, setSettingForm] = useState(initialSettingForm);
            
            const initialJobcodeForm = { id: null, jobcode: '', namaPekerjaan: '', type: 'FULL PAKET', lokasi: '', customerName: '' };
            const [jobcodeForm, setJobcodeForm] = useState(initialJobcodeForm);
            
            const initialBankAccountForm = { id: null, namaBank: '', noRekening: '', atasNama: '' };
            const [bankAccountForm, setBankAccountForm] = useState(initialBankAccountForm);

            const [paymentForm, setPaymentForm] = useState({ id: null, noInvoice: '', totalSetelahPph: 0, danaMasukBaru: 0, backchargeBaru: 0, tglPembayaranBaru: new Date().toISOString().split('T')[0], namaBankBaru: '', rekeningBankBaru: '', history: [] });

            const fileInputPelanggan = useRef(null); const fileInputJobcode = useRef(null); const fileInputInvoice = useRef(null); const fileInputProgress = useRef(null);

            const currentYearCalc = new Date().getFullYear();
            const availableYears = []; for (let y = 2024; y <= Math.max(2025, currentYearCalc + 1); y++) availableYears.push(y);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true); const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline); window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            // LISTENERS DATABASE BERDASARKAN PROFIL
            useEffect(() => {
                const unsubC = onSnapshotData('customers', setCustomers);
                const unsubJ = onSnapshotData('jobcodes', setJobcodes);
                const unsubP = onSnapshotData('progresses', setProgresses);
                const unsubB = onSnapshotData('bank_accounts', setBankAccounts);
                const unsubI = onSnapshotData('invoices', (data) => { setInvoices(data); setIsDbConnected(true); });
                return () => { unsubC(); unsubJ(); unsubP(); unsubB(); unsubI(); };
            }, []);

            useEffect(() => { if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [chatHistory, isChatOpen]);
            useEffect(() => { if (customers.length > 0 && !invoiceForm.customerName && !invoiceForm.id && !invoiceForm.jobcode) setInvoiceForm(prev => ({ ...prev, customerName: customers[0].name })); }, [customers, invoiceForm.id, invoiceForm.jobcode]);

            const calculateInvoiceFields = (inv, customerList) => {
                const cust = customerList.find(c => c.name === inv.customerName); const term = cust ? (parseInt(cust.term, 10) || 0) : 0;
                let tglJatuhTempo = '-';
                if (inv.tglPenyerahan || inv.date) { const d = new Date(inv.tglPenyerahan || inv.date); if (!isNaN(d.getTime())) { d.setDate(d.getDate() + term); tglJatuhTempo = d.toISOString().split('T')[0]; } }
                const dpp = Number(inv.hargaJual) || 0; const minSblm = Number(inv.pengurangSblm) || 0; const pajak = Number(inv.ppn) || 0; const minStlh = Number(inv.pengurangStlh) || 0; const pph = Number(inv.pph23) || 0; const masuk = Number(inv.danaMasuk) || 0; const charge = Number(inv.backcharge) || 0;
                const totalTagihan = dpp - minSblm + pajak - minStlh; const totalSetelahPph = totalTagihan - pph; const sisaPiutang = totalSetelahPph - masuk - charge;
                let statusPembayaran = inv.isCancelled ? 'BATAL' : (sisaPiutang <= 0 && dpp > 0 ? 'PAID' : 'OUTSTANDING');
                return { ...inv, tglJatuhTempo, totalTagihan, totalSetelahPph, sisaPiutang, statusPembayaran };
            };

            const processedInvoices = useMemo(() => invoices.map(inv => calculateInvoiceFields(inv, customers)), [invoices, customers]);

            const dashboardStats = useMemo(() => {
                let totalPiutang = 0, totalDanaMasuk = 0, totalTagihanTerbit = 0, outstandingCount = 0; 
                const detailInvoices = { hariIni: { dpp: 0, pSblm: 0, ppn: 0, pStlh: 0, total: 0 }, bulanBerjalan: { dpp: 0, pSblm: 0, ppn: 0, pStlh: 0, total: 0 }, bulanLalu: { dpp: 0, pSblm: 0, ppn: 0, pStlh: 0, total: 0 }, tahunBerjalan: { dpp: 0, pSblm: 0, ppn: 0, pStlh: 0, total: 0 } };
                const detailDanaMasuk = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'].map(m => ({ name: m, w1: 0, w2: 0, w3: 0, w4: 0, w5: 0, total: 0 }));
                const detailPiutang = {};
